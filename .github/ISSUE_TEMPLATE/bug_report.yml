name: Bug report
description: Something is not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider(s) involved
      multiple: true
      options:
        - GitHub Actions
        - GitLab CI
        - Azure DevOps
        - Jira
        - Not provider-specific

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: e.g. Chrome 124, Windows 11
    validations:
      required: true
