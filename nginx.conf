server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-term cache for hashed assets (JS, CSS, fonts)
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cache for index.html so updates are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header X-XSS-Protection         "1; mode=block"                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

    # CSP — tighten connect-src if self-hosted GitLab/Jira URLs are known
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: https:; \
         connect-src 'self' \
             https://api.github.com \
             https://gitlab.com https://*.gitlab.com \
             https://dev.azure.com https://app.vssps.visualstudio.com \
             https://vsrm.dev.azure.com https://*.visualstudio.com \
             https://*.atlassian.net https://*.jira.com; \
         font-src 'self'; \
         object-src 'none'; \
         base-uri 'self'; \
         frame-ancestors 'none';"
        always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
