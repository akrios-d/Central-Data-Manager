<div class="onboarding-wrap">
  <div class="onboarding-card">
    <div class="onboarding-logo">⬡ CDM</div>
    <h1>Welcome to Central Data Manager</h1>
    <p class="subtitle">Connect your GitHub and Azure DevOps accounts to get started. Tokens are stored only in your browser.</p>

    <section class="token-section">
      <h2><span class="section-icon">◎</span> GitHub</h2>
      <div class="form-group">
        <label for="gh-owner">Username or Organisation</label>
        <input id="gh-owner" class="form-control" type="text" placeholder="e.g. my-org"
          [ngModel]="ghOwner()" (ngModelChange)="ghOwner.set($event)" />
      </div>
      <div class="form-group mt-1">
        <label for="gh-token">Personal Access Token</label>
        <input id="gh-token" class="form-control" type="password" placeholder="ghp_..."
          [ngModel]="ghToken()" (ngModelChange)="ghToken.set($event)" />
      </div>
      <p class="hint">Needs <code>repo</code> and <code>workflow</code> scopes.</p>
    </section>

    <section class="token-section">
      <h2><span class="section-icon">◧</span> Azure DevOps</h2>
      <div class="form-group">
        <label for="ado-org">Organisation name</label>
        <input id="ado-org" class="form-control" type="text" placeholder="e.g. my-company"
          [ngModel]="adoOrg()" (ngModelChange)="adoOrg.set($event)" />
      </div>
      <div class="form-group mt-1">
        <label for="ado-token">Personal Access Token</label>
        <input id="ado-token" class="form-control" type="password" placeholder="PAT..."
          [ngModel]="adoToken()" (ngModelChange)="adoToken.set($event)" />
      </div>
      <p class="hint">Needs read/write on Work Items and read on Boards.</p>
    </section>

    <button class="btn btn-primary w-full mt-3" [disabled]="!canSave" (click)="save()">
      Save &amp; continue
    </button>
  </div>
</div>
